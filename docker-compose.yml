services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payment_gateway
    command: sh -c "npm ci --omit=dev && npx prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payment_gateway
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payment_gateway_shadow
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: payment-gateway
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      WEBHOOK_SIGNING_SECRET_PEPPER: dev-webhook-pepper-change-in-production
      API_KEY_PEPPER: dev-api-key-pepper-change-in-production
      NODE_ENV: development
      PROCESS_TYPE: api
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: node dist/apps/worker/main
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payment_gateway
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payment_gateway_shadow
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: payment-gateway
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      WEBHOOK_SIGNING_SECRET_PEPPER: dev-webhook-pepper-change-in-production
      API_KEY_PEPPER: dev-api-key-pepper-change-in-production
      NODE_ENV: development
      PROCESS_TYPE: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
